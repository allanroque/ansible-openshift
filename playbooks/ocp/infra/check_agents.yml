---
# =============================================================================
# Health Check: Agentes Obrigatórios
# Valida que Dynatrace e Fluent Bit estão rodando nos namespaces corretos
# =============================================================================
- name: Health Check — Agentes Obrigatórios
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Verificar cada agente obrigatório
      ansible.builtin.include_tasks: tasks/check_single_agent.yml
      loop: "{{ required_agents }}"
      loop_control:
        loop_var: agent
        label: "{{ agent.name }}"

    - name: Relatório final dos agentes
      ansible.builtin.debug:
        msg: |
          ========================== AGENTS HEALTH REPORT ==========================
          Total de agentes verificados : {{ agent_results | length }}
          --------------------------------------------------------------------------
          {% for r in agent_results %}
          Agente   : {{ r.name }}
            Namespace : {{ r.namespace }}
            Pods      : {{ r.pod_count }} ({{ 'todos Running' if r.all_running else 'NEM TODOS Running' }})
            Lista     : {{ r.pods }}
          {% endfor %}
          ==========================================================================
