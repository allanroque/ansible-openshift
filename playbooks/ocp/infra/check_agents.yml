---
# =============================================================================
# Health Check: Agentes Obrigatórios (Dynatrace, Fluent Bit, ...)
# Faz discovery em múltiplos namespaces/labels e reporta status de instalação.
# Falha apenas se um agente com enforce=true NÃO estiver instalado.
# =============================================================================
- name: Health Check — Agentes Obrigatórios
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Inicializar lista de resultados
      ansible.builtin.set_fact:
        agent_results: []

    - name: Verificar cada agente
      ansible.builtin.include_tasks: tasks/check_single_agent.yml
      loop: "{{ required_agents }}"
      loop_control:
        loop_var: agent
        label: "{{ agent.name }}"

    - name: Obter Infrastructure (nome do cluster)
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: Infrastructure
        name: cluster
      register: infrastructure
      failed_when: false

    - name: Calcular agentes faltantes (enforce=true e não instalados)
      ansible.builtin.set_fact:
        cluster_name: "{{ infrastructure.resources[0].status.infrastructureName | default('unknown') }}"
        missing_agents: >-
          {{ agent_results
             | selectattr('enforced')
             | rejectattr('installed')
             | list }}

    - name: Relatório final dos agentes
      ansible.builtin.debug:
        msg: |
          ========================== AGENTS HEALTH REPORT ==========================
          Cluster : {{ cluster_name }}
          --------------------------------------------------------------------------
          {% for r in agent_results %}
          Agente : {{ r.name }}
            Status     : {{ 'INSTALADO' if r.installed else 'NÃO INSTALADO' }}
            Enforcement: {{ 'enforce=true (falha se ausente)' if r.enforced else 'enforce=false (apenas reporta)' }}
          {% if r.installed %}
            Namespaces : {{ r.namespaces }}
            Pods       : {{ r.pod_count }} ({{ 'todos Running' if r.all_running else 'NEM TODOS Running' }})
            Lista      : {{ r.pods }}
          {% endif %}
          {% endfor %}
          ==========================================================================

    # =========================================================================
    # Publica artefatos para o próximo job do workflow (ex: criar incidente
    # no ServiceNow). set_stats roda ANTES do assert para garantir que as
    # variáveis sejam propagadas mesmo se este job falhar.
    # =========================================================================
    - name: Publicar artefatos para o próximo job do workflow (ServiceNow)
      ansible.builtin.set_stats:
        data:
          incident_required: "{{ missing_agents | length > 0 }}"
          cluster_name: "{{ cluster_name }}"
          missing_agents_list: "{{ missing_agents | map(attribute='name') | list }}"
          sn_short_description: >-
            {%- if missing_agents | length > 0 -%}
            [OCP {{ cluster_name }}] Agente(s) obrigatório(s) não instalado(s):
            {{ missing_agents | map(attribute='name') | list | join(', ') }}
            {%- else -%}
            [OCP {{ cluster_name }}] Todos os agentes obrigatórios estão instalados
            {%- endif -%}
          sn_description: |-
            Cluster: {{ cluster_name }}
            {% if missing_agents | length > 0 %}
            Componentes obrigatórios NÃO instalados:
            {% for a in missing_agents %}
            - {{ a.name }}
            {% endfor %}

            Ação: validar instalação dos agentes acima no cluster {{ cluster_name }}.
            {% else %}
            Todos os agentes obrigatórios foram detectados e estão saudáveis.
            {% endif %}
            Verificação executada via AAP (Health Check OCP).
          sn_impact: "medium"
          sn_urgency: "medium"

    - name: Falhar se algum agente com enforce=true NÃO está instalado
      ansible.builtin.assert:
        that:
          - item.installed
          - item.all_running
        fail_msg: >-
          Agente obrigatório '{{ item.name }}' NÃO está instalado
          (ou tem pods fora de Running). Defina enforce_{{ item.name | replace('-', '_') }}=false
          via Survey para tolerar a ausência.
        success_msg: "Agente '{{ item.name }}' instalado e saudável"
      loop: "{{ agent_results | selectattr('enforced') | list }}"
      loop_control:
        label: "{{ item.name }}"
