---
# =============================================================================
# Tasks para discovery de um único agente
# Espera as variáveis:
#   agent.name         — nome lógico (dynatrace, fluent-bit, ...)
#   agent.enforce      — bool: true falha se não instalado, false apenas reporta
#   agent.detection    — lista de {namespace, label_selector} a tentar
# Acumula resultado em agent_results (lista de dicts)
# =============================================================================
- name: "Procurar pods do {{ agent.name }} em locais conhecidos"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ candidate.namespace }}"
    label_selectors:
      - "{{ candidate.label_selector }}"
  register: pod_search
  loop: "{{ agent.detection }}"
  loop_control:
    loop_var: candidate
    label: "{{ candidate.namespace }} / {{ candidate.label_selector }}"
  failed_when: false

- name: "Agregar pods encontrados de todos os candidatos para {{ agent.name }}"
  ansible.builtin.set_fact:
    found_pods: >-
      {{ pod_search.results
         | map(attribute='resources')
         | map('default', [], true)
         | sum(start=[]) }}

- name: "Acumular resultado do {{ agent.name }} no relatório"
  ansible.builtin.set_fact:
    agent_results: "{{ agent_results | default([]) + [single_result] }}"
  vars:
    pod_namespaces: "{{ found_pods | map(attribute='metadata.namespace') | list | unique }}"
    phases: "{{ found_pods | map(attribute='status.phase') | list }}"
    is_installed: "{{ found_pods | length > 0 }}"
    all_running: "{{ is_installed and (phases | unique == ['Running']) }}"
    single_result:
      name: "{{ agent.name }}"
      enforced: "{{ agent.enforce | bool }}"
      installed: "{{ is_installed }}"
      pod_count: "{{ found_pods | length }}"
      namespaces: "{{ pod_namespaces }}"
      pods: "{{ found_pods | map(attribute='metadata.name') | list }}"
      all_running: "{{ all_running }}"
