---
# =============================================================================
# Health Check: Worker Nodes
# Valida que os worker nodes existem e estão no estado Ready
# =============================================================================
- name: Health Check — Worker Nodes
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Obter lista de nodes do cluster
      kubernetes.core.k8s_info:
        kind: Node
      register: all_nodes

    - name: Identificar workers explícitos (label node-role.kubernetes.io/worker)
      ansible.builtin.set_fact:
        explicit_workers: >-
          {{ all_nodes.resources
             | selectattr('metadata.labels', 'defined')
             | selectattr('metadata.labels.node-role.kubernetes.io/worker', 'defined')
             | list }}

    - name: Definir worker_nodes (fallback p/ todos os nodes em clusters compact/SNO)
      ansible.builtin.set_fact:
        worker_nodes: "{{ explicit_workers if explicit_workers | length > 0 else all_nodes.resources }}"
        topology_mode: "{{ 'standard' if explicit_workers | length > 0 else 'compact-or-sno' }}"

    - name: Exibir worker nodes encontrados
      ansible.builtin.debug:
        msg: >-
          Topologia: {{ topology_mode }} —
          {{ worker_nodes | length }} node(s):
          {{ worker_nodes | map(attribute='metadata.name') | list }}

    - name: Garantir que existe pelo menos um worker node
      ansible.builtin.assert:
        that:
          - worker_nodes | length > 0
        fail_msg: "Nenhum worker node encontrado no cluster"
        success_msg: "{{ worker_nodes | length }} worker(s) encontrado(s)"

    - name: Validar que todos os workers estão Ready
      ansible.builtin.assert:
        that:
          - item.status.conditions
            | selectattr('type', 'equalto', 'Ready')
            | selectattr('status', 'equalto', 'True')
            | list | length > 0
        fail_msg: "Worker {{ item.metadata.name }} NÃO está Ready"
        success_msg: "Worker {{ item.metadata.name }} está Ready"
      loop: "{{ worker_nodes }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    # =========================================================================
    # Coleta de dados para o relatório final
    # =========================================================================
    - name: Obter ClusterVersion (versão do OCP)
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: cluster_version
      failed_when: false

    - name: Obter Infrastructure (provider, region)
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: Infrastructure
        name: cluster
      register: infrastructure
      failed_when: false

    - name: Contar namespaces
      kubernetes.core.k8s_info:
        kind: Namespace
      register: namespaces

    - name: Contar deployments (proxy para # de aplicações)
      kubernetes.core.k8s_info:
        kind: Deployment
      register: deployments

    - name: Relatório final do Health Check
      ansible.builtin.debug:
        msg: |
          ========================== HEALTH CHECK REPORT ==========================
          Cluster Name       : {{ infrastructure.resources[0].status.infrastructureName | default('N/A') }}
          OCP Version        : {{ cluster_version.resources[0].status.desired.version | default('N/A') }}
          Channel            : {{ cluster_version.resources[0].spec.channel | default('N/A') }}
          Platform           : {{ infrastructure.resources[0].status.platform | default('N/A') }}
          API Server URL     : {{ infrastructure.resources[0].status.apiServerURL | default('N/A') }}
          --------------------------------------------------------------------------
          Topologia          : {{ topology_mode }}
          Total Nodes        : {{ all_nodes.resources | length }}
          Worker Nodes       : {{ worker_nodes | length }}
          Namespaces         : {{ namespaces.resources | length }}
          Deployments        : {{ deployments.resources | length }}
          --------------------------------------------------------------------------
          Detalhe dos Workers:
          {% for node in worker_nodes %}
            - {{ node.metadata.name }}
                Ready    : {{ (node.status.conditions | selectattr('type', 'equalto', 'Ready') | list | first).status }}
                OS Image : {{ node.status.nodeInfo.osImage | default('N/A') }}
                Kernel   : {{ node.status.nodeInfo.kernelVersion | default('N/A') }}
                Kubelet  : {{ node.status.nodeInfo.kubeletVersion | default('N/A') }}
                Runtime  : {{ node.status.nodeInfo.containerRuntimeVersion | default('N/A') }}
                CPU      : {{ node.status.capacity.cpu | default('N/A') }}
                Memory   : {{ node.status.capacity.memory | default('N/A') }}
          {% endfor %}
          ==========================================================================
