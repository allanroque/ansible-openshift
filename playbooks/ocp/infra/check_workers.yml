---
# =============================================================================
# Health Check: Worker Nodes
# Valida que os worker nodes existem e estão no estado Ready
# =============================================================================
- name: Health Check — Worker Nodes
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Obter lista de nodes do cluster
      kubernetes.core.k8s_info:
        kind: Node
      register: all_nodes

    - name: Filtrar worker nodes
      ansible.builtin.set_fact:
        worker_nodes: >-
          {{ all_nodes.resources
             | selectattr('metadata.labels', 'defined')
             | selectattr('metadata.labels.node-role.kubernetes.io/worker', 'defined')
             | list }}

    - name: Exibir worker nodes encontrados
      ansible.builtin.debug:
        msg: "Workers encontrados ({{ worker_nodes | length }}): {{ worker_nodes | map(attribute='metadata.name') | list }}"

    - name: Garantir que existe pelo menos um worker node
      ansible.builtin.assert:
        that:
          - worker_nodes | length > 0
        fail_msg: "Nenhum worker node encontrado no cluster"
        success_msg: "{{ worker_nodes | length }} worker(s) encontrado(s)"

    - name: Validar que todos os workers estão Ready
      ansible.builtin.assert:
        that:
          - item.status.conditions
            | selectattr('type', 'equalto', 'Ready')
            | selectattr('status', 'equalto', 'True')
            | list | length > 0
        fail_msg: "Worker {{ item.metadata.name }} NÃO está Ready"
        success_msg: "Worker {{ item.metadata.name }} está Ready"
      loop: "{{ worker_nodes }}"
      loop_control:
        label: "{{ item.metadata.name }}"
