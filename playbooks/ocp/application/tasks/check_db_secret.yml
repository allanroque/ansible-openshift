---
# =============================================================================
# Avalia um único Secret de banco de dados.
# Espera: sec (o Secret encontrado), db_required_keys_list (lista de chaves).
# Acumula em db_report (lista de dicts).
# =============================================================================
- name: "Extrair chaves do Secret {{ sec.metadata.namespace }}/{{ sec.metadata.name }}"
  ansible.builtin.set_fact:
    sec_keys: "{{ (sec.data | default({})).keys() | list }}"

- name: "Calcular missing_keys"
  ansible.builtin.set_fact:
    sec_missing_keys: "{{ db_required_keys_list | difference(sec_keys) }}"

- name: "Computar status do Secret"
  ansible.builtin.set_fact:
    sec_status: >-
      {%- if sec_keys | length == 0 -%}
      EMPTY
      {%- elif sec_missing_keys | length > 0 -%}
      MISSING_KEYS
      {%- else -%}
      OK
      {%- endif -%}
    sec_issue: >-
      {%- if sec_keys | length == 0 -%}
      Secret existe mas data está vazio
      {%- elif sec_missing_keys | length > 0 -%}
      Faltam chaves: {{ sec_missing_keys | join(', ') }}
      {%- else -%}{%- endif -%}

- name: "Acumular no relatório"
  ansible.builtin.set_fact:
    db_report: "{{ db_report + [entry] }}"
  vars:
    entry:
      namespace: "{{ sec.metadata.namespace }}"
      name: "{{ sec.metadata.name }}"
      keys: "{{ sec_keys }}"
      missing_keys: "{{ sec_missing_keys }}"
      status: "{{ sec_status }}"
      issue: "{{ sec_issue }}"
