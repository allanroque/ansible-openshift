---
# =============================================================================
# Variáveis para Health Check OCP — preparadas para Survey no AAP
# =============================================================================

# --- Infraestrutura ---
# Controle de enforcement por agente — sobrescritível via Survey no AAP.
# true  = falha o playbook se o agente NÃO estiver instalado
# false = apenas reporta no relatório final, sem falhar
enforce_dynatrace: true
enforce_fluent_bit: true

# Agentes obrigatórios — cada agente tem múltiplos padrões de detecção
# (operator, helm, daemonset, etc) para cobrir formas diferentes de instalação
required_agents:
  - name: dynatrace
    enforce: "{{ enforce_dynatrace | bool }}"
    detection:
      - namespace: dynatrace
        label_selector: "app.kubernetes.io/name=dynatrace-operator"
      - namespace: dynatrace
        label_selector: "app.kubernetes.io/managed-by=dynatrace-operator"
      - namespace: dynatrace
        label_selector: "internal.oneagent.dynatrace.com/component=oneagent"
      - namespace: dynatrace-system
        label_selector: "app.kubernetes.io/name=dynatrace-operator"
  - name: fluent-bit
    enforce: "{{ enforce_fluent_bit | bool }}"
    detection:
      - namespace: openshift-logging
        label_selector: "app.kubernetes.io/name=fluent-bit"
      - namespace: openshift-logging
        label_selector: "component=fluent-bit"
      - namespace: openshift-logging
        label_selector: "k8s-app=fluentbit"

# --- Rede / Segurança (L7) ---
# Route Sharding
# Se true, exige routeSelector.matchLabels com a chave/valor configurados.
# Defina false em clusters sem sharding por label (ex: HyperShift sem shards custom).
enforce_route_sharding: true
expected_route_domain: "apps.example.com"
ingress_controller_name: "default"
expected_route_selector_key: "type"
expected_route_selector_value: "sharded"

# --- Aplicação ---
# Namespace da aplicação
app_namespace: "my-app"

# Banco de dados — Secret
db_secret_name: "db-credentials"
db_secret_namespace: "{{ app_namespace }}"

# External Secrets Operator (ESO)
external_secret_name: "my-app-secrets"
external_secret_namespace: "{{ app_namespace }}"

# Routes / Ingress (cluster-wide scan)
# Filtrar por namespace específico (vazio = todos)
route_namespace_filter: ""
# Excluir namespaces de sistema (openshift-*, kube-*, default)
route_exclude_system_namespaces: true
# Fazer GET em cada route admitida? (lento — 1 req por route)
route_test_http: false
# Timeout em segundos por requisição HTTP
route_http_timeout: 10
# Se true, falha o playbook quando há routes com problema
enforce_route_check: true

# --- Aplicação específica (legado, usado por check_database/check_eso/etc) ---
app_route_name: "my-app"
app_route_namespace: "{{ app_namespace }}"
app_url: "https://my-app.apps.example.com"
expected_http_status: 200

# --- Certificados SSL (cluster-wide scan) ---
# Filtra por namespace específico (vazio = todos)
cert_namespace_filter: ""
# Excluir namespaces de sistema (openshift-*, kube-*, default)
cert_exclude_system_namespaces: true
# Alerta se cert expira em menos de N dias
cert_min_days_remaining: 30
# Se true, falha o playbook quando há routes com problema
enforce_certificate_check: true

# --- Headers / Segurança ---
# URL para testar manipulação de headers
header_test_url: "{{ app_url }}"
# Valor forjado para x-forwarded-host
forged_forwarded_host: "malicious.example.com"
# Status HTTP esperado quando header é manipulado (403 = bloqueado, 200 = não bloqueado)
expected_blocked_status: 403

# --- Acesso Externo (Akamai/CDN) ---
# URL pública acessível via CDN/Akamai
external_url: "https://my-app.example.com"
expected_external_http_status: 200
# Timeout em segundos para validação externa
external_timeout: 30
# Header esperado que confirma passagem pelo CDN (ex: X-Cache, X-Akamai-Request-ID)
cdn_header_name: "X-Cache"
