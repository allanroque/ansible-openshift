---
# =============================================================================
# Health Check: Proteção de Headers (x-forwarded-host)
# Valida que o ambiente bloqueia requests com x-forwarded-host manipulado
# =============================================================================
- name: Health Check — Proteção de Headers
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    # -----------------------------------------------------------------
    # 1. Request legítimo — baseline
    # -----------------------------------------------------------------
    - name: Realizar request legítimo (baseline)
      ansible.builtin.uri:
        url: "{{ header_test_url }}"
        method: GET
        return_content: false
        validate_certs: true
        status_code: 200
      register: baseline_response

    - name: Validar que request legítimo passou
      ansible.builtin.assert:
        that:
          - baseline_response.status == 200
        fail_msg: >-
          Request legítimo falhou com status {{ baseline_response.status }}.
          O endpoint pode estar indisponível.
        success_msg: "Request legítimo OK — HTTP {{ baseline_response.status }}"

    # -----------------------------------------------------------------
    # 2. Request com x-forwarded-host forjado — deve ser bloqueado
    # -----------------------------------------------------------------
    - name: Realizar request com x-forwarded-host forjado
      ansible.builtin.uri:
        url: "{{ header_test_url }}"
        method: GET
        headers:
          X-Forwarded-Host: "{{ forged_forwarded_host }}"
        return_content: true
        validate_certs: true
        status_code:
          - "{{ expected_blocked_status }}"
          - 200
      register: forged_response

    - name: Validar que x-forwarded-host forjado foi bloqueado
      ansible.builtin.assert:
        that:
          - forged_response.status == expected_blocked_status | int
        fail_msg: >-
          VULNERABILIDADE: request com x-forwarded-host='{{ forged_forwarded_host }}'
          retornou HTTP {{ forged_response.status }} (esperado {{ expected_blocked_status }}).
          O ambiente NÃO está protegido contra manipulação de headers.
        success_msg: >-
          Proteção ativa — request com x-forwarded-host forjado
          bloqueado com HTTP {{ forged_response.status }}

    # -----------------------------------------------------------------
    # 3. Request com x-forwarded-host duplicado — deve ser bloqueado
    # -----------------------------------------------------------------
    - name: Realizar request com x-forwarded-host duplicado
      ansible.builtin.uri:
        url: "{{ header_test_url }}"
        method: GET
        headers:
          X-Forwarded-Host: "{{ forged_forwarded_host }}, {{ forged_forwarded_host }}"
        return_content: true
        validate_certs: true
        status_code:
          - "{{ expected_blocked_status }}"
          - 200
      register: duplicated_response

    - name: Validar que x-forwarded-host duplicado foi bloqueado
      ansible.builtin.assert:
        that:
          - duplicated_response.status == expected_blocked_status | int
        fail_msg: >-
          VULNERABILIDADE: request com x-forwarded-host duplicado
          retornou HTTP {{ duplicated_response.status }} (esperado {{ expected_blocked_status }}).
          O ambiente NÃO bloqueia headers duplicados.
        success_msg: >-
          Proteção ativa — request com x-forwarded-host duplicado
          bloqueado com HTTP {{ duplicated_response.status }}

    # -----------------------------------------------------------------
    # 4. Resumo
    # -----------------------------------------------------------------
    - name: Resumo da validação de headers
      ansible.builtin.debug:
        msg:
          - "Request legítimo:           HTTP {{ baseline_response.status }}"
          - "x-forwarded-host forjado:   HTTP {{ forged_response.status }}"
          - "x-forwarded-host duplicado: HTTP {{ duplicated_response.status }}"
