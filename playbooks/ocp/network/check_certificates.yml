---
# =============================================================================
# Health Check: Certificados SSL (cluster-wide scan)
# Lê todas as Routes com TLS, parseia o cert e classifica cada uma:
#   OK | EXPIRING_SOON | EXPIRED | CN_MISMATCH | MISSING_CERT
#   PASSTHROUGH | DEFAULT_CERT | PARSE_ERROR
# Publica artefatos via set_stats para o próximo job do workflow (ServiceNow).
# =============================================================================
- name: Health Check — Certificados SSL (cluster-wide)
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Obter Infrastructure (nome do cluster)
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: Infrastructure
        name: cluster
      register: infrastructure
      failed_when: false

    - name: Obter Routes (cluster-wide ou por namespace)
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ cert_namespace_filter if (cert_namespace_filter | length > 0) else omit }}"
      register: all_routes

    - name: Filtrar routes com TLS (e excluir namespaces de sistema se configurado)
      ansible.builtin.set_fact:
        cluster_name: "{{ infrastructure.resources[0].status.infrastructureName | default('unknown') }}"
        candidate_routes: >-
          {{ all_routes.resources
             | selectattr('spec.tls', 'defined')
             | rejectattr('metadata.namespace', 'match',
                          '^(openshift|kube|default)([-.]|$)'
                          if (cert_exclude_system_namespaces | bool)
                          else '$.^')
             | list }}
        cert_report: []

    - name: Avaliar certificado de cada route
      ansible.builtin.include_tasks: tasks/check_route_certificate.yml
      loop: "{{ candidate_routes }}"
      loop_control:
        loop_var: rt
        label: "{{ rt.metadata.namespace }}/{{ rt.metadata.name }}"

    - name: Calcular routes com problema
      ansible.builtin.set_fact:
        problematic: >-
          {{ cert_report
             | selectattr('status', 'in', ['EXPIRED', 'EXPIRING_SOON',
                                            'CN_MISMATCH', 'MISSING_CERT',
                                            'PARSE_ERROR'])
             | list }}

    - name: Calcular contagens por status
      ansible.builtin.set_fact:
        count_ok: "{{ cert_report | selectattr('status','equalto','OK') | list | length }}"
        count_expiring: "{{ cert_report | selectattr('status','equalto','EXPIRING_SOON') | list | length }}"
        count_expired: "{{ cert_report | selectattr('status','equalto','EXPIRED') | list | length }}"
        count_cn_mismatch: "{{ cert_report | selectattr('status','equalto','CN_MISMATCH') | list | length }}"
        count_missing: "{{ cert_report | selectattr('status','equalto','MISSING_CERT') | list | length }}"
        count_passthrough: "{{ cert_report | selectattr('status','equalto','PASSTHROUGH') | list | length }}"
        count_default: "{{ cert_report | selectattr('status','equalto','DEFAULT_CERT') | list | length }}"
        count_parse_error: "{{ cert_report | selectattr('status','equalto','PARSE_ERROR') | list | length }}"

    - name: Relatório final dos certificados
      ansible.builtin.debug:
        msg: |
          ============== CERTIFICATE HEALTH REPORT ==============
          Cluster              : {{ cluster_name }}
          Namespace filter     : {{ cert_namespace_filter | default('(todos)') or '(todos)' }}
          Excluir system NS    : {{ cert_exclude_system_namespaces }}
          Min days remaining   : {{ cert_min_days_remaining }}
          Routes c/ TLS analisadas: {{ cert_report | length }}
          --------------------------------------------------------
          OK              : {{ count_ok }}
          EXPIRING_SOON   : {{ count_expiring }}
          EXPIRED         : {{ count_expired }}
          CN_MISMATCH     : {{ count_cn_mismatch }}
          MISSING_CERT    : {{ count_missing }}
          PASSTHROUGH     : {{ count_passthrough }}
          DEFAULT_CERT    : {{ count_default }}
          PARSE_ERROR     : {{ count_parse_error }}
          --------------------------------------------------------
          {% for r in cert_report %}
          [{{ r.status }}] {{ r.namespace }}/{{ r.name }}
            Host        : {{ r.host }}
            Termination : {{ r.termination or '(none)' }}
            Cert source : {{ r.cert_source or 'N/A' }}
          {% if r.cn %}
            CN          : {{ r.cn }}
          {% endif %}
          {% if r.expires_in not in ['', none] %}
            Expira em   : {{ r.expires_in }} dias ({{ r.not_after }})
          {% endif %}
          {% if r.issue %}
            Issue       : {{ r.issue }}
          {% endif %}
          {% endfor %}
          ========================================================

    - name: Publicar artefatos para o próximo job do workflow (ServiceNow)
      ansible.builtin.set_stats:
        data:
          incident_required: "{{ problematic | length > 0 }}"
          cluster_name: "{{ cluster_name }}"
          problematic_routes: "{{ problematic | map(attribute='namespace') | zip(problematic | map(attribute='name')) | map('join', '/') | list }}"
          sn_short_description: >-
            {%- if problematic | length > 0 -%}
            [OCP {{ cluster_name }}] {{ problematic | length }} route(s) com problema de certificado
            {%- else -%}
            [OCP {{ cluster_name }}] Certificados OK ({{ count_ok }} routes validadas)
            {%- endif -%}
          sn_description: |-
            Cluster: {{ cluster_name }}
            Total de routes com TLS: {{ cert_report | length }}
            Resumo:
              OK: {{ count_ok }} | EXPIRING_SOON: {{ count_expiring }} | EXPIRED: {{ count_expired }}
              CN_MISMATCH: {{ count_cn_mismatch }} | MISSING_CERT: {{ count_missing }}
              PASSTHROUGH: {{ count_passthrough }} | DEFAULT_CERT: {{ count_default }}
              PARSE_ERROR: {{ count_parse_error }}
            {% if problematic | length > 0 %}

            Routes com problema:
            {% for r in problematic %}
            - [{{ r.status }}] {{ r.namespace }}/{{ r.name }}
              Host: {{ r.host }}
              {% if r.expires_in not in ['', none] %}Expira em {{ r.expires_in }} dias ({{ r.not_after }}){% endif %}
              {% if r.issue %}{{ r.issue }}{% endif %}
            {% endfor %}

            Ação: revisar/renovar os certificados das routes acima.
            {% else %}
            Todos os certificados estão saudáveis.
            {% endif %}
            Verificação executada via AAP (Health Check OCP).
          sn_impact: "medium"
          sn_urgency: "medium"

    - name: Falhar se enforce=true e há routes com problema
      ansible.builtin.assert:
        that:
          - problematic | length == 0
        fail_msg: >-
          {{ problematic | length }} route(s) com problema de certificado.
          Veja o relatório acima.
        success_msg: "Todas as routes com TLS estão saudáveis"
      when: enforce_certificate_check | bool
