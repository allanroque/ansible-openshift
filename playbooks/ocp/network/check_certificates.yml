---
# =============================================================================
# Health Check: Certificados SSL
# Valida TLS na Route, presença do certificado e conexão HTTPS válida
#
# Nota: a validação de CN e datas de expiração depende do módulo
# community.crypto.x509_certificate_info. Se não disponível, o playbook
# valida via k8s_info (Route/Secret) e uri (conexão TLS).
# =============================================================================
- name: Health Check — Certificados SSL
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/main.yml

  tasks:
    # -----------------------------------------------------------------
    # 1. Validar que Route existe e tem TLS
    # -----------------------------------------------------------------
    - name: Obter Route com certificado
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ certificate_route_name }}"
        namespace: "{{ certificate_route_namespace }}"
      register: route_result

    - name: Validar que Route existe
      ansible.builtin.assert:
        that:
          - route_result.resources | length > 0
        fail_msg: >-
          Route '{{ certificate_route_name }}' não encontrada
          no namespace '{{ certificate_route_namespace }}'

    - name: Extrair Route
      ansible.builtin.set_fact:
        route: "{{ route_result.resources[0] }}"

    - name: Validar que Route possui TLS configurado
      ansible.builtin.assert:
        that:
          - route.spec.tls is defined
        fail_msg: "Route '{{ certificate_route_name }}' não possui configuração TLS"
        success_msg: >-
          Route '{{ certificate_route_name }}' possui TLS
          tipo {{ route.spec.tls.termination | default('não definido') }}

    # -----------------------------------------------------------------
    # 2. Validar presença do certificado na Route (edge/reencrypt)
    # -----------------------------------------------------------------
    - name: Validar certificado na Route (edge/reencrypt)
      when: route.spec.tls.termination | default('') in ['edge', 'reencrypt']
      block:
        - name: Verificar presença do certificado inline
          ansible.builtin.assert:
            that:
              - route.spec.tls.certificate is defined or route.spec.tls.destinationCACertificate is defined
            fail_msg: "Nenhum certificado encontrado na configuração TLS da Route"
            success_msg: "Certificado presente na configuração TLS da Route"

    # -----------------------------------------------------------------
    # 3. Buscar Secrets TLS no namespace (cert-manager / manual)
    # -----------------------------------------------------------------
    - name: Buscar Secrets de tipo TLS no namespace
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ certificate_route_namespace }}"
        field_selectors:
          - type=kubernetes.io/tls
      register: tls_secrets

    - name: Exibir Secrets TLS encontrados
      ansible.builtin.debug:
        msg: >-
          {{ tls_secrets.resources | length }} Secret(s) TLS encontrado(s):
          {{ tls_secrets.resources | map(attribute='metadata.name') | list }}

    - name: Validar que existe pelo menos um Secret TLS
      ansible.builtin.assert:
        that:
          - tls_secrets.resources | length > 0
        fail_msg: >-
          Nenhum Secret TLS encontrado no namespace '{{ certificate_route_namespace }}'
        success_msg: >-
          {{ tls_secrets.resources | length }} Secret(s) TLS encontrado(s)
      when: route.spec.tls.termination | default('') != 'passthrough'

    # -----------------------------------------------------------------
    # 4. Validar certificado via community.crypto (CN + validade)
    #    Requer: pip install cryptography
    #    Collection: community.crypto
    # -----------------------------------------------------------------
    - name: Validar CN e validade do certificado (community.crypto)
      when:
        - tls_secrets.resources | length > 0
        - route.spec.tls.termination | default('') != 'passthrough'
      block:
        - name: Decodificar certificado do primeiro Secret TLS
          ansible.builtin.set_fact:
            cert_pem: "{{ tls_secrets.resources[0].data['tls.crt'] | b64decode }}"

        - name: Obter informações do certificado
          community.crypto.x509_certificate_info:
            content: "{{ cert_pem }}"
          register: cert_info
          ignore_errors: true

        - name: Validar CN do certificado
          ansible.builtin.assert:
            that:
              - expected_certificate_cn in cert_info.subject.commonName | default('')
                or cert_info.subject_alt_name | default([])
                   | select('match', 'DNS:' + expected_certificate_cn)
                   | list | length > 0
            fail_msg: >-
              CN esperado '{{ expected_certificate_cn }}'.
              CN atual: {{ cert_info.subject.commonName | default('N/A') }}.
              SANs: {{ cert_info.subject_alt_name | default([]) }}
            success_msg: "CN do certificado válido: {{ cert_info.subject.commonName | default('N/A') }}"
          when:
            - cert_info is not failed
            - expected_certificate_cn | length > 0

        - name: Calcular dias restantes até expiração
          ansible.builtin.set_fact:
            cert_days_remaining: >-
              {{ ((cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) -
                  (ansible_date_time.iso8601 | default(now()) | to_datetime('%Y-%m-%dT%H:%M:%S%z'))).days
                 | default(0) }}
          when: cert_info is not failed
          ignore_errors: true

        - name: Exibir validade do certificado
          ansible.builtin.debug:
            msg: >-
              Certificado válido de {{ cert_info.not_before | default('N/A') }}
              até {{ cert_info.not_after | default('N/A') }}
          when: cert_info is not failed

      rescue:
        - name: Aviso — community.crypto não disponível
          ansible.builtin.debug:
            msg: >-
              AVISO: Não foi possível validar CN/validade do certificado.
              Instale a collection community.crypto e o pacote cryptography:
              ansible-galaxy collection install community.crypto &&
              pip install cryptography

    # -----------------------------------------------------------------
    # 5. Validar conexão TLS ao endpoint (teste final)
    # -----------------------------------------------------------------
    - name: Validar conexão HTTPS ao endpoint
      ansible.builtin.uri:
        url: "https://{{ route.spec.host }}"
        method: HEAD
        return_content: false
        validate_certs: true
      register: ssl_check
      ignore_errors: true

    - name: Validar que conexão TLS foi estabelecida
      ansible.builtin.assert:
        that:
          - ssl_check is not failed
        fail_msg: >-
          Falha na conexão TLS com {{ route.spec.host }}.
          Erro: {{ ssl_check.msg | default('desconhecido') }}
        success_msg: "Conexão TLS com {{ route.spec.host }} estabelecida com sucesso"
